name: lastbench
description: LastBench - Real-time messaging platform for students and communities

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  socket_io_client: ^2.0.3+1
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  image_picker: ^1.0.4
  file_picker: ^5.5.0
  flutter_secure_storage: ^8.0.0
  flutter_local_notifications: ^16.1.0
  permission_handler: ^11.0.1
  flutter_svg: ^2.0.7
  flutter_emoji: ^1.2.0
  cached_network_image: ^3.3.0
  intl: ^0.18.1
  connectivity_plus: ^5.0.1
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
